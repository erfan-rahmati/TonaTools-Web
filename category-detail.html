<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>محصولات بست کمربندی | TonaTools - توزیع‌کننده پیشرو تجهیزات صنعتی</title>
    <meta name="description"
        content="خرید انواع بست کمربندی فولادی، استیل و گالوانیزه با بهترین قیمت و ضمانت اصالت کالا">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Swiper JS CSS -->
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/category-detail.css">
</head>

<body>

    <main class="category-page">

        <!-- مسیر راهنما -->
        <div class="breadcrumb">
            <div class="container">
                <a href="index.html">خانه</a>
                <span>/</span>
                <a href="#">محصولات</a>
                <span>/</span>
            </div>
        </div>

        <!-- فیلترها -->
        <section class="filter-section">
            <div class="container">
                <div class="filter-wrapper">
                    <div class="filter-group">
                        <select class="sort-select" id="sortSelect">
                            <option value="default">مرتب‌سازی: پیش‌فرض</option>
                            <option value="price_asc">ارزان‌ترین</option>
                            <option value="price_desc">گران‌ترین</option>
                            <option value="newest">جدیدترین</option>
                        </select>
                        <button class="filter-btn" id="mobileFilterBtn" style="display: none;">
                            <i class="fas fa-filter"></i> فیلترها
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- محتوای اصلی -->
        <section class="category-main-section">
            <div class="container">
                <div class="category-layout">

                    <!-- سایدبار فیلتر -->
                    <div class="filter-sidebar" id="filterSidebar">
                        <h3 class="filter-sidebar-title">فیلتر محصولات</h3>
                        <div class="filter-sidebar-section">
                            <h4>محدوده قیمت</h4>
                            <div class="price-range">
                                <div class="price-inputs">
                                    <input type="number" id="priceMin" placeholder="از">
                                    <input type="number" id="priceMax" placeholder="تا">
                                </div>
                                <button class="apply-filter-btn" id="applyPriceFilter">اعمال فیلتر</button>
                            </div>
                        </div>
                    </div>

                    <!-- گرید محصولات -->
                    <div>
                        <div class="products-grid" id="productsGrid">
                            <div class="loading-products">
                                <i class="fas fa-spinner fa-pulse" style="font-size:40px; color:#f9ae13;"></i>
                                <p>در حال بارگذاری محصولات...</p>
                            </div>
                        </div>

                        <!-- صفحه‌بندی -->
                        <div class="pagination" id="pagination"></div>

                        <!-- توضیحات دسته‌بندی -->
                        <div class="category-description" id="categoryDescription">
                            <!-- داینامیک پر می‌شود -->
                        </div>
                    </div>

                </div>
            </div>
        </section>

    </main>

    <!-- اسکریپت‌ها -->
    <script src="assets/js/swiper-bundle.min.js"></script>
    <script src="assets/js/loader.js"></script>
    <script src="assets/js/click-animation.js"></script>
    <script src="assets/js/category-detail.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/swiperInit.js"></script>

</body>

</html>
